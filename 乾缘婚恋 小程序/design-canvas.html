<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>乾缘 · 3 主题对比</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    body { font-family: "Noto Sans SC", system-ui; -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    button, input, textarea { font-family: inherit; }
    .ab-inner { width: 100%; height: 100%; overflow: hidden; position: relative; }
    a { text-decoration: none; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components/design-canvas.jsx"></script>
  <script type="text/babel" src="components/theme.jsx"></script>
  <script type="text/babel" src="components/data.jsx"></script>
  <script type="text/babel" src="components/ui.jsx"></script>
  <script type="text/babel" src="components/screens.jsx"></script>
  <script type="text/babel" src="components/screens2.jsx"></script>

  <script type="text/babel">
    // Wrap a screen in a theme + fixed-size frame
    function Board({ themeKey, screen, candidateId }) {
      const theme = THEMES[themeKey];
      const [filterState, setFilterState] = React.useState({ gender: '男', city: '北京-北京-请选择', year: '1987' });
      const [tab, setTab] = React.useState(
        screen === 'home' ? 'home' :
        screen === 'list' ? 'list' :
        screen === 'share' ? 'share' :
        screen === 'msg' ? 'msg' :
        screen === 'me' ? 'me' : 'list'
      );
      const showTab = !['detail', 'form', 'filter'].includes(screen);

      const inner = {
        home: <HomeScreen onStart={() => {}} filterState={filterState} setFilterState={setFilterState}/>,
        list: <ListScreen onOpenDetail={() => {}} onOpenFilter={() => {}} onOpenForm={() => {}} />,
        detail: <DetailScreen candidateId={candidateId || CANDIDATES[0].id} onBack={() => {}} onHome={() => {}} />,
        form: <FormScreen onClose={() => {}} onSave={() => {}} />,
        share: <ShareScreen />,
        msg: <MessagesScreen onOpenChat={() => {}} />,
        me: <MeScreen onOpenForm={() => {}} />,
        filter: <FilterScreen onClose={() => {}} />,
      }[screen];

      return (
        <ThemeContext.Provider value={theme}>
          <div className="ab-inner" style={{ background: theme.bg, fontSize: 14 }}>
            <div style={{ position: 'absolute', inset: 0, overflowY: 'auto' }}>
              {inner}
            </div>
            {showTab && <TabBar active={tab} onChange={setTab} />}
          </div>
        </ThemeContext.Provider>
      );
    }

    // Color + type card
    function StyleTile({ themeKey }) {
      const t = THEMES[themeKey];
      return (
        <div style={{ width: '100%', height: '100%', background: t.bg, padding: 28,
          fontFamily: t.bodyFont, color: t.ink, display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ fontFamily: t.displayFont, fontSize: 38, fontWeight: 600, letterSpacing: 4, lineHeight: 1.1 }}>
            乾缘<br/>{t.name}
          </div>
          <div style={{ fontSize: 12, color: t.inkMuted, letterSpacing: 1, marginTop: -6 }}>{t.description}</div>
          <div style={{ display: 'flex', gap: 6, marginTop: 12 }}>
            {['bg','surface','surfaceAlt','accent','accentDeep','ink'].map(k => (
              <div key={k} style={{ flex: 1 }}>
                <div style={{ height: 56, background: t[k], borderRadius: t.radiusSm,
                  border: `1px solid ${t.line}` }} />
                <div style={{ fontFamily: t.monoFont, fontSize: 9, color: t.inkMuted, marginTop: 4, textAlign: 'center' }}>
                  {t[k].toUpperCase().replace('#','')}
                </div>
              </div>
            ))}
          </div>
          <div style={{ borderTop: `1px solid ${t.line}`, paddingTop: 14, marginTop: 4 }}>
            <div style={{ fontFamily: t.displayFont, fontSize: 22, fontWeight: 600, letterSpacing: 1, color: t.ink }}>
              千里姻缘 · 一线相牵
            </div>
            <div style={{ fontFamily: t.bodyFont, fontSize: 13, color: t.inkMuted, marginTop: 4, lineHeight: 1.6 }}>
              为您精心挑选 · 今日推荐 12 位有缘人
            </div>
            <div style={{ fontFamily: t.monoFont, fontSize: 11, color: t.accent, marginTop: 8, letterSpacing: 1 }}>
              寻缘号 · 36830153
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 'auto' }}>
            <button style={{
              flex: 1, background: t.accent, color: t.accentInk, border: 'none',
              borderRadius: t.radius - 2, padding: '11px 16px', fontSize: 13,
              fontFamily: t.bodyFont, fontWeight: 500, letterSpacing: 2,
            }}>开始寻缘 →</button>
            <button style={{
              flex: 1, background: 'transparent', color: t.accent,
              border: `1px solid ${t.accent}`, borderRadius: t.radius - 2,
              padding: '11px 16px', fontSize: 13, fontFamily: t.bodyFont, letterSpacing: 2,
            }}>联系对方</button>
          </div>
        </div>
      );
    }

    function App() {
      const themes = ['dawn', 'ink', 'jade'];
      const makeBoards = (screen, candidateId) => themes.map(tk => (
        <DCArtboard key={tk} id={`${screen}-${tk}`} label={`${THEMES[tk].name} · ${screen}`} width={340} height={736}>
          <Board themeKey={tk} screen={screen} candidateId={candidateId} />
        </DCArtboard>
      ));

      return (
        <DesignCanvas>
          <DCSection id="brand" title="品牌基调" subtitle="三套视觉方案 · 色板与字体">
            {themes.map(tk => (
              <DCArtboard key={tk} id={`tile-${tk}`} label={`${THEMES[tk].name} · ${THEMES[tk].description}`} width={420} height={540}>
                <StyleTile themeKey={tk} />
              </DCArtboard>
            ))}
          </DCSection>

          <DCSection id="home" title="首页 · 每日推荐" subtitle="登记相亲者性别 / 居住地 / 年龄">
            {makeBoards('home')}
          </DCSection>

          <DCSection id="list" title="相亲资料列表" subtitle="每日精选候选人 · 卡片流">
            {makeBoards('list')}
          </DCSection>

          <DCSection id="detail" title="资料详情" subtitle="基础信息 · 择偶要求 · 解锁联系">
            {makeBoards('detail')}
          </DCSection>

          <DCSection id="form" title="填写我的资料" subtitle="完善度进度 · 表单 + 照片">
            {makeBoards('form')}
          </DCSection>

          <DCSection id="share" title="经验分享" subtitle="红娘直播 · 经验帖子流">
            {makeBoards('share')}
          </DCSection>

          <DCSection id="msg" title="消息" subtitle="会话列表 · 未读气泡">
            {makeBoards('msg')}
          </DCSection>

          <DCSection id="filter" title="筛选面板" subtitle="多条件组合筛选">
            {makeBoards('filter')}
          </DCSection>

          <DCSection id="me" title="我的" subtitle="会员中心 · 个人资料入口">
            {makeBoards('me')}
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check app

      - name: Ruff format check
        run: uv run ruff format app --check

      - name: Mypy
        run: uv run mypy app

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run coverage run -m pytest tests/ -v
        env:
          # SQLite in-memory，无需真实数据库
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          FIRST_SUPERUSER: "admin@example.com"
          FIRST_SUPERUSER_PASSWORD: "ci-test-password"
          PROJECT_NAME: "qianchenhunlian-ci"
          POSTGRES_SERVER: "localhost"
          POSTGRES_USER: "postgres"

      - name: Coverage report
        run: uv run coverage report

  admin-build:
    name: Admin — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Biome lint
        run: ./node_modules/.bin/biome check --no-errors-on-unmatched --files-ignore-unknown=true ./

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

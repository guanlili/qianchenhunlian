<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>乾缘婚恋 · 小程序原型</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #E8E4DE; }
    body { font-family: "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
           -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    .ext { display: flex; align-items: center; justify-content: center; gap: 40px;
           min-height: 100vh; padding: 28px; flex-wrap: wrap; }
    .stage-label { position: absolute; top: -26px; left: 0; font-family: "DM Mono", monospace;
                   font-size: 11px; color: rgba(0,0,0,0.5); letter-spacing: 1px; }
    .ext-stage { position: relative; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/ios-frame.jsx"></script>
  <script type="text/babel" src="components/theme.jsx"></script>
  <script type="text/babel" src="components/data.jsx"></script>
  <script type="text/babel" src="components/ui.jsx"></script>
  <script type="text/babel" src="components/screens.jsx"></script>
  <script type="text/babel" src="components/screens2.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "jade",
      "fontScale": 0.95,
      "density": "comfortable",
      "initialScreen": "home"
    }/*EDITMODE-END*/;

    function App() {
      // persistent state
      const [tweaks, setTweaks] = React.useState(() => {
        try {
          const saved = localStorage.getItem('qy-tweaks');
          if (saved) return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) };
        } catch (e) {}
        return TWEAK_DEFAULTS;
      });
      const [editMode, setEditMode] = React.useState(false);

      const [screen, setScreen] = React.useState(() => {
        try { return localStorage.getItem('qy-screen') || tweaks.initialScreen || 'home'; } catch { return 'home'; }
      });
      const [tab, setTab] = React.useState('home'); // home | list | share | msg | me
      const [detailId, setDetailId] = React.useState(null);
      const [filterOpen, setFilterOpen] = React.useState(false);
      const [chatMsg, setChatMsg] = React.useState(null);
      const [filterState, setFilterState] = React.useState({ gender: '男', city: '北京-北京-请选择', year: '1987' });

      React.useEffect(() => {
        try { localStorage.setItem('qy-tweaks', JSON.stringify(tweaks)); } catch {}
      }, [tweaks]);
      React.useEffect(() => {
        try { localStorage.setItem('qy-screen', screen); } catch {}
      }, [screen]);

      // Tweaks host protocol
      React.useEffect(() => {
        const listener = (e) => {
          const d = e.data;
          if (!d || typeof d !== 'object') return;
          if (d.type === '__activate_edit_mode') setEditMode(true);
          if (d.type === '__deactivate_edit_mode') setEditMode(false);
        };
        window.addEventListener('message', listener);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', listener);
      }, []);

      const updateTweak = (k, v) => {
        setTweaks(t => {
          const next = { ...t, [k]: v };
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
          return next;
        });
      };

      const theme = React.useMemo(() => {
        const base = THEMES[tweaks.theme] || THEMES.dawn;
        return { ...base };
      }, [tweaks.theme]);

      const screenEls = {
        home: <HomeScreen
          filterState={filterState}
          setFilterState={setFilterState}
          onStart={() => { setScreen('list'); setTab('list'); }} />,
        list: <ListScreen
          onOpenDetail={(id) => { setDetailId(id); setScreen('detail'); }}
          onOpenFilter={() => setFilterOpen(true)}
          onOpenForm={() => setScreen('form')} />,
        detail: <DetailScreen
          candidateId={detailId}
          onBack={() => setScreen('list')}
          onHome={() => { setScreen('home'); setTab('home'); }} />,
        form: <FormScreen
          onClose={() => setScreen(tab === 'me' ? 'me' : 'list')}
          onSave={() => setScreen(tab === 'me' ? 'me' : 'list')} />,
        msg: chatMsg
          ? <ChatScreen msg={chatMsg} onBack={() => setChatMsg(null)} />
          : <MessagesScreen onOpenChat={(m) => setChatMsg(m)} />,
        share: <ShareScreen />,
        me: <MeScreen onOpenForm={() => setScreen('form')} />,
      };

      const onTabChange = (k) => {
        setTab(k);
        setChatMsg(null);
        if (k === 'home') setScreen('home');
        else if (k === 'list') setScreen('list');
        else if (k === 'share') setScreen('share');
        else if (k === 'msg') setScreen('msg');
        else if (k === 'me') setScreen('me');
      };

      const showTabBar = !['detail', 'form'].includes(screen) && !chatMsg;

      // Apply font scale globally via CSS variable on frame
      const rootFontSize = 14 * tweaks.fontScale;

      return (
        <ThemeContext.Provider value={theme}>
          <div className="ext">
            <div className="ext-stage">
              <span className="stage-label">IPHONE · 乾缘婚恋</span>
              <IOSDevice width={402} height={874} dark={false}>
                <div style={{
                  width: '100%', height: '100%', position: 'relative',
                  background: theme.bg, fontSize: rootFontSize,
                  overflow: 'hidden',
                }}>
                  <div key={screen + (chatMsg?.id || '')} style={{
                    position: 'absolute', inset: 0, overflowY: 'auto',
                    animation: 'qy-fade 0.25s ease-out',
                  }}>
                    {screenEls[screen]}
                  </div>
                  {showTabBar && <TabBar active={tab} onChange={onTabChange} />}
                  {filterOpen && (
                    <div style={{ position: 'absolute', inset: 0, zIndex: 80, background: theme.bg }}>
                      <FilterScreen onClose={() => setFilterOpen(false)} />
                    </div>
                  )}
                </div>
              </IOSDevice>
            </div>

            {/* Mini map — quick screen nav */}
            <div style={{
              width: 220, display: 'flex', flexDirection: 'column', gap: 8,
              fontFamily: '"Noto Sans SC", system-ui', color: '#3a3530',
              alignSelf: 'flex-start', paddingTop: 0,
            }}>
              <div style={{ fontFamily: '"Noto Serif SC", serif', fontSize: 22, fontWeight: 600, letterSpacing: 2, color: '#2a2520', marginBottom: 4 }}>
                乾缘 · 原型
              </div>
              <div style={{ fontSize: 11, color: '#6b655d', lineHeight: 1.7, marginBottom: 10 }}>
                3 种风格 · 7 个页面<br/>
                点击下方快速跳转页面，<br/>
                或打开 Tweaks 切换主题。
              </div>
              {[
                ['home', '首页 · 每日推荐'],
                ['list', '资料列表'],
                ['detail', '资料详情'],
                ['form', '填写我的资料'],
                ['share', '经验分享'],
                ['msg', '消息'],
                ['me', '我的'],
              ].map(([k, label]) => (
                <button key={k} onClick={() => {
                  setChatMsg(null);
                  setFilterOpen(false);
                  if (k === 'detail' && !detailId) setDetailId(CANDIDATES[0].id);
                  setScreen(k);
                  if (['home','list','share','msg','me'].includes(k)) setTab(k === 'home' ? 'home' : k);
                }} style={{
                  padding: '10px 14px', textAlign: 'left', cursor: 'pointer',
                  background: screen === k ? '#2a2520' : 'transparent',
                  color: screen === k ? '#FBF6F1' : '#3a3530',
                  border: screen === k ? 'none' : '1px solid rgba(0,0,0,0.1)',
                  borderRadius: 6, fontSize: 12, fontFamily: 'inherit',
                  letterSpacing: 1,
                }}>{label}</button>
              ))}
              <button onClick={() => setFilterOpen(true)} style={{
                padding: '10px 14px', textAlign: 'left', cursor: 'pointer',
                background: 'transparent', color: '#3a3530',
                border: '1px dashed rgba(0,0,0,0.2)',
                borderRadius: 6, fontSize: 12, marginTop: 4, letterSpacing: 1,
              }}>筛选面板（弹层）</button>
              <a href="design-canvas.html" style={{
                marginTop: 14, padding: '10px 14px', textAlign: 'center', cursor: 'pointer',
                background: '#D96B5E', color: '#fff', borderRadius: 6, fontSize: 12,
                textDecoration: 'none', letterSpacing: 2, fontWeight: 500,
              }}>▸ 打开 3 主题画板</a>
            </div>

            {/* Tweaks panel */}
            {editMode && (
              <div style={{
                position: 'fixed', bottom: 24, right: 24, zIndex: 100,
                background: '#FFFFFF', borderRadius: 14, padding: '18px 20px',
                boxShadow: '0 20px 50px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.06)',
                width: 260, fontFamily: '"Noto Sans SC", system-ui', color: '#2a2520',
              }}>
                <div style={{ fontFamily: '"Noto Serif SC", serif', fontSize: 15, fontWeight: 600, letterSpacing: 2, marginBottom: 14 }}>Tweaks</div>

                <div style={{ fontSize: 11, color: '#8a8278', marginBottom: 6 }}>主题</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, marginBottom: 14 }}>
                  {Object.values(THEMES).map(t => (
                    <button key={t.key} onClick={() => updateTweak('theme', t.key)} style={{
                      padding: '10px 4px', borderRadius: 6,
                      border: tweaks.theme === t.key ? `1.5px solid ${t.accent}` : '1px solid rgba(0,0,0,0.1)',
                      background: tweaks.theme === t.key ? t.accentSoft : '#fff',
                      cursor: 'pointer', fontSize: 11,
                      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                    }}>
                      <div style={{ display: 'flex', gap: 2 }}>
                        <span style={{ width: 10, height: 10, borderRadius: 5, background: t.accent }}/>
                        <span style={{ width: 10, height: 10, borderRadius: 5, background: t.surface, border: '1px solid rgba(0,0,0,0.1)' }}/>
                        <span style={{ width: 10, height: 10, borderRadius: 5, background: t.ink }}/>
                      </div>
                      <span style={{ fontFamily: '"Noto Serif SC", serif', fontSize: 12, fontWeight: 500 }}>{t.name}</span>
                    </button>
                  ))}
                </div>

                <div style={{ fontSize: 11, color: '#8a8278', marginBottom: 6 }}>
                  字号 · <span style={{ fontFamily: '"DM Mono", monospace' }}>{tweaks.fontScale.toFixed(2)}×</span>
                </div>
                <input type="range" min="0.9" max="1.25" step="0.05"
                  value={tweaks.fontScale}
                  onChange={e => updateTweak('fontScale', parseFloat(e.target.value))}
                  style={{ width: '100%', marginBottom: 14 }} />

                <div style={{ fontSize: 11, color: '#8a8278', marginBottom: 6 }}>默认首屏</div>
                <div style={{ display: 'flex', gap: 6 }}>
                  {[['home', '首页'], ['list', '列表'], ['share', '分享']].map(([k, l]) => (
                    <button key={k} onClick={() => updateTweak('initialScreen', k)} style={{
                      flex: 1, padding: '6px 8px', borderRadius: 4,
                      border: tweaks.initialScreen === k ? '1.5px solid #D96B5E' : '1px solid rgba(0,0,0,0.1)',
                      background: tweaks.initialScreen === k ? '#FBE4DF' : '#fff',
                      cursor: 'pointer', fontSize: 11,
                    }}>{l}</button>
                  ))}
                </div>
              </div>
            )}
          </div>
          <style>{`@keyframes qy-fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }`}</style>
        </ThemeContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
